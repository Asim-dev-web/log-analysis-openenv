spec_version: 1
name: log_analysis
version: "1.0.0"
type: custom
runtime: docker
app: server.app:app
port: 8000
description: |
  Log Analysis Environment for incident investigation.
  Agent investigates system incidents by fetching logs and metrics,
  then submits diagnosis with root cause, severity, affected services,
  and recommended action. Three difficulty levels: easy, medium, hard.